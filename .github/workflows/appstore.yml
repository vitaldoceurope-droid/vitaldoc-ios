name: Upload to App Store

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      
      - name: Select Xcode 16
        run: sudo xcode-select -s /Applications/Xcode_16.app
        
      - name: Install certificate
        env:
          P12_BASE64: ${{ secrets.P12_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          KEYCHAIN_PASSWORD: vitaldoc2026
        run: |
          echo $P12_BASE64 | base64 --decode > certificate.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security import certificate.p12 -k build.keychain -P "$P12_PASSWORD" -T /usr/bin/codesign
          security list-keychains -s build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" build.keychain

      - name: Install provisioning profile
        env:
          PROFILE_BASE64: ${{ secrets.PROFILE_BASE64 }}
        run: |
          echo $PROFILE_BASE64 | base64 --decode > profile.mobileprovision
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp profile.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/

      - name: Build Archive
        run: |
          xcodebuild archive \
            -project VITALDOC1.xcodeproj \
            -scheme VITALDOC1 \
            -archivePath build/VITALDOC1.xcarchive \
            -configuration Release \
            -sdk iphoneos \
            -destination "generic/platform=iOS" \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM=J7V69TQXP2 \
            PROVISIONING_PROFILE_SPECIFIER="VitalDoc App Store Distribution" \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            SUPPORTS_MACCATALYST=NO \
            ENABLE_PREVIEWS=NO \
            EXCLUDED_ARCHS[sdk=iphonesimulator*]=arm64

      - name: Export IPA
        run: |
          xcodebuild -exportArchive \
            -archivePath build/VITALDOC1.xcarchive \
            -exportPath build/ \
            -exportOptionsPlist ExportOptions.plist

      - name: Upload to App Store
        env:
          ASC_USERNAME: ${{ secrets.ASC_USERNAME }}
          ASC_PASSWORD: ${{ secrets.ASC_PASSWORD }}
        run: |
          xcrun altool --upload-app \
            -f build/VITALDOC1.ipa \
            -u "$ASC_USERNAME" \
            -p "$ASC_PASSWORD"
